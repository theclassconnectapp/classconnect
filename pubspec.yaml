name: classconnect
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_picker: ^10.3.2
  firebase_core: ^4.1.1
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_storage: ^13.0.1
  google_sign_in: ^7.1.1
  firebase_messaging: ^16.0.2
  flutter_local_notifications: ^19.4.0
  cached_network_image: ^3.4.1
  image_picker: ^1.2.0
  url_launcher: ^6.3.2
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4
  open_filex: ^4.7.0
  http: ^1.2.0
  http_parser: ^4.0.2
  flutter_dotenv: ^5.2.1
  path_provider: ^2.1.2
  flutter_bloc: ^9.1.1
  flutter_markdown: ^0.7.7
  shared_preferences: ^2.5.5
  get_it: ^9.2.1

  # added for in-app media preview
  video_player: ^2.9.2
  chewie: ^1.8.5
  flutter_pdfview: ^1.4.0
  photo_view: ^0.15.0
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.development
    - .env.production

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ClassConnect.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/ClassConnect.png"
